name: CI/CD Pipeline

# Triggers
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ================================================================
  # STAGE 1: Build & Compile
  # ================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Order Service
        run: mvn clean compile -f order-service/pom.xml -B

      - name: Build Notification Service
        run: mvn clean compile -f notification-service/pom.xml -B

      - name: Package JARs
        run: |
          mvn package -DskipTests -f order-service/pom.xml -B
          mvn package -DskipTests -f notification-service/pom.xml -B

      - name: Upload Order Service JAR
        uses: actions/upload-artifact@v4
        with:
          name: order-service-jar
          path: order-service/target/order-service-1.0.0.jar

      - name: Upload Notification Service JAR
        uses: actions/upload-artifact@v4
        with:
          name: notification-service-jar
          path: notification-service/target/notification-service-1.0.0.jar

  # ================================================================
  # STAGE 2: Static Analysis (SpotBugs + PMD + Checkstyle)
  # ================================================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # --- SpotBugs (finds bugs in Java code) ---
      - name: Run SpotBugs - Order Service
        run: mvn compile spotbugs:check -f order-service/pom.xml -B
        continue-on-error: true

      - name: Run SpotBugs - Notification Service
        run: mvn compile spotbugs:check -f notification-service/pom.xml -B
        continue-on-error: true

      # --- OWASP Dependency Check (security vulnerabilities) ---
      - name: OWASP Dependency Check - Order Service
        run: mvn org.owasp:dependency-check-maven:check -f order-service/pom.xml -B -DfailBuildOnCVSS=9
        continue-on-error: true

      - name: OWASP Dependency Check - Notification Service
        run: mvn org.owasp:dependency-check-maven:check -f notification-service/pom.xml -B -DfailBuildOnCVSS=9
        continue-on-error: true

      # --- Upload reports ---
      - name: Upload SpotBugs Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: static-analysis-reports
          path: |
            order-service/target/spotbugsXml.xml
            notification-service/target/spotbugsXml.xml
            order-service/target/dependency-check-report.html
            notification-service/target/dependency-check-report.html

  # ================================================================
  # STAGE 3: Unit Tests
  # ================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests - Order Service
        run: mvn test -f order-service/pom.xml -B
        continue-on-error: true

      - name: Run Tests - Notification Service
        run: mvn test -f notification-service/pom.xml -B
        continue-on-error: true

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            order-service/target/surefire-reports/
            notification-service/target/surefire-reports/

  # ================================================================
  # STAGE 4: Security Scan
  # ================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build for CodeQL
        run: |
          mvn compile -f order-service/pom.xml -B -DskipTests
          mvn compile -f notification-service/pom.xml -B -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ================================================================
  # STAGE 5: Package & Release (only on main)
  # ================================================================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, static-analysis, test, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Final JARs
        run: |
          mvn clean package -DskipTests -f order-service/pom.xml -B
          mvn clean package -DskipTests -f notification-service/pom.xml -B

      - name: Create Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-jars
          path: |
            order-service/target/order-service-1.0.0.jar
            notification-service/target/notification-service-1.0.0.jar
          retention-days: 30
