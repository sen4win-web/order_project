server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

spring:
  application:
    name: order-service

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${DB_USERNAME:orderuser}
    password: ${DB_PASSWORD:orderpass}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 10000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        linger.ms: 5
        batch.size: 16384
        max.block.ms: 5000

# Outbox polling interval
outbox:
  polling:
    interval: ${OUTBOX_POLL_INTERVAL:1000}
  batch-size: ${OUTBOX_BATCH_SIZE:50}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      kafkaProducer:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      kafkaProducer:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2

# Application config
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  auth:
    demo-username: ${AUTH_USERNAME:admin}
    demo-password: ${AUTH_PASSWORD:admin123}
  kafka:
    topic: ${KAFKA_TOPIC:order-events}
    partitions: ${KAFKA_PARTITIONS:3}

# JWT
jwt:
  secret: ${JWT_SECRET:Y2hhbmdlLXRoaXMtdG8tYS1sb25nLXNlY3VyZS1yYW5kb20tc2VjcmV0LWtleS1pbi1wcm9kdWN0aW9u}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

# Logging
logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","service":"${spring.application.name}","correlationId":"%X{correlationId}","message":"%msg"}%n'
  level:
    com.orderplatform: ${LOG_LEVEL:INFO}
    org.apache.kafka: WARN
    org.hibernate.SQL: WARN
